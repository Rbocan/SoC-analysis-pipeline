# render.yaml — Render Blueprint for SoC Dashboard
# Deploy via: Render Dashboard → New Blueprint → connect this repo
#
# After deploy, set CORS_ORIGINS manually in the soc-backend environment:
#   ["https://<your-project>.vercel.app"]

services:
  - type: web
    name: soc-backend
    region: oregon
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: soc-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false  # Set manually after Vercel URL is known

  - type: redis
    name: soc-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []  # Internal Render network only — no public access

databases:
  - name: soc-db
    region: oregon
    databaseName: soc_dashboard
    user: soc
    plan: free
    ipAllowList: []  # Internal Render network only — no public access
